{% extends "layout.html" %}
{% block content %}
    <div class="post">
        <img class="post-img" src="{{ url_for('static', filename='img/'+ post.author.image_file)}}" >
        <div class="post-content">
            <p class="meta"> <a href="{{ url_for('user_posts', username=post.author.username) }}"><span> {{ post.author.username }} </span> </a>  {{ post.date_posted.strftime('%Y-%m-%d') }}</p>
            
            <h2 class="title">{{ post.title }}</h2>
            <p class="content">{{ post.content }}</p>
            {% if post.author == current_user %}
                <div class="buttons">
                    <a class="update-btn" href="{{ url_for('update_post', post_id= post.id)}}">Update</a>
                    <form action="{{ url_for('delete_post',post_id= post.id)}}" method="POST">
                        <input class= "delete-btn" type="submit" value="Delete">
                    </form>
                </div>
            {% endif %}
        </div>
        
    </div>
{% endblock content %}
